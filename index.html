<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>教車師父管理系統</title>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1a2233; --sub:#6b7486;
  --blue:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706;
  --line:#e3e8ef; --rad:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; font-family:-apple-system,"PingFang HK","PingFang TC",sans-serif; background:var(--bg); color:var(--ink); padding-bottom:80px;}
header{background:var(--blue); color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 16px 14px; position:sticky; top:0; z-index:5;}
header h1{margin:0; font-size:19px; font-weight:700;}
header .sub{font-size:12px; opacity:.85; margin-top:2px;}
nav{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line); display:flex; z-index:9; padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1; background:none; border:none; padding:10px 0 8px; font-size:12px; color:var(--sub); cursor:pointer;}
nav button .ic{font-size:20px; display:block; margin-bottom:2px;}
nav button.on{color:var(--blue); font-weight:700;}
main{padding:14px; max-width:860px; margin:0 auto;}
.card{background:var(--card); border-radius:var(--rad); padding:14px; margin-bottom:12px; box-shadow:0 1px 3px rgba(20,30,60,.06);}
.card h3{margin:0 0 10px; font-size:15px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat{background:var(--card); border-radius:var(--rad); padding:12px; box-shadow:0 1px 3px rgba(20,30,60,.06);}
.stat .v{font-size:22px; font-weight:800; margin-top:4px;}
.stat .l{font-size:12px; color:var(--sub);}
.btn{display:inline-block; border:none; border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; background:var(--blue); color:#fff;}
.btn.sm{padding:6px 10px; font-size:12px; border-radius:8px;}
.btn.grey{background:#eef1f6; color:var(--ink);}
.btn.green{background:var(--green);}
.btn.red{background:var(--red);}
.btn.amber{background:var(--amber);}
.row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.right{margin-left:auto;}
.item{border-bottom:1px solid var(--line); padding:10px 0;}
.item:last-child{border-bottom:none;}
.tag{display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:#e8eefc; color:var(--blue); margin:1px 2px 1px 0;}
.tag.g{background:#e6f6ec; color:var(--green);}
.tag.r{background:#fdeaea; color:var(--red);}
.tag.a{background:#fdf3e3; color:var(--amber);}
.tag .x{cursor:pointer; color:var(--red); font-weight:700; margin-left:4px;}
.muted{color:var(--sub); font-size:12px;}
input,select,textarea{width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; font-size:15px; background:#fff; color:var(--ink); font-family:inherit;}
label{font-size:12px; color:var(--sub); display:block; margin:10px 0 4px; font-weight:600;}
.chart{display:flex; align-items:flex-end; gap:4px; height:120px; margin-top:8px;}
.chart .bar{flex:1; background:var(--blue); border-radius:4px 4px 0 0; min-height:2px; position:relative;}
.chart .bar span{position:absolute; bottom:-18px; left:0; right:0; text-align:center; font-size:9px; color:var(--sub);}
.chart .bar b{position:absolute; top:-16px; left:0; right:0; text-align:center; font-size:9px; color:var(--ink); font-weight:600;}
.chartwrap{padding-bottom:22px; padding-top:16px;}
#modalbg{display:none; position:fixed; inset:0; background:rgba(10,15,30,.45); z-index:20;}
#modal{display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:92%; max-width:480px; max-height:86vh; overflow:auto; background:var(--card); border-radius:16px; padding:18px; z-index:21;}
#modal h3{margin:0 0 4px;}
.checkrow{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px;}
.checkrow label{display:inline-flex; align-items:center; gap:4px; margin:0; background:#eef1f6; padding:7px 10px; border-radius:8px; font-size:13px; color:var(--ink); cursor:pointer;}
.checkrow input{width:auto;}
.searchbox{margin-bottom:12px;}
table{width:100%; border-collapse:collapse; font-size:13px;}
th,td{text-align:left; padding:8px 6px; border-bottom:1px solid var(--line);}
th{color:var(--sub); font-weight:600; font-size:12px;}
.score{color:var(--amber); letter-spacing:1px;}
.thumb{width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line); cursor:pointer;}
.pct{font-weight:800;}
@media(min-width:700px){ .grid2{grid-template-columns:repeat(4,1fr);} }
</style>
</head>
<body>
<header>
  <h1>🚗 教車師父管理系統</h1>
  <div class="sub" id="today"></div>
</header>
<main id="main"></main>
<nav id="nav">
  <button data-t="dash" class="on"><span class="ic">📊</span>統計</button>
  <button data-t="students"><span class="ic">👥</span>學生</button>
  <button data-t="schedule"><span class="ic">📅</span>排堂</button>
  <button data-t="money"><span class="ic">💰</span>帳目</button>
  <button data-t="settings"><span class="ic">⚙️</span>設定</button>
</nav>
<div id="modalbg" onclick="closeModal()"></div>
<div id="modal"></div>

<script>
/* ================= 預設設定 ================= */
function DEF(){ return {
  defaultFee:50,
  rates:{g2:50, g:55, rental:150},
  topics:['直路控制','轉彎','平行泊車','斜路泊車','倒後入位','三點掉頭','高速公路','轉線','路口讓先','緊急停車','路試路線','夜駕','雨天駕駛'],
  centres:['Port Union','Metro East (Scarborough)','Downsview','Etobicoke','Newmarket','Brampton','Oshawa','其他'],
  curriculum:[
    {t:'第1堂：基本控制與儀表',k:['直路控制','轉彎']},
    {t:'第2堂：轉彎與路口讓先',k:['轉彎','路口讓先']},
    {t:'第3堂：住宅區綜合練習',k:['直路控制','路口讓先']},
    {t:'第4堂：三點掉頭',k:['三點掉頭']},
    {t:'第5堂：倒後入位',k:['倒後入位']},
    {t:'第6堂：平行泊車',k:['平行泊車']},
    {t:'第7堂：斜路泊車與起步',k:['斜路泊車']},
    {t:'第8堂：緊急停車與危險應對',k:['緊急停車']},
    {t:'第9堂：轉線與盲點',k:['轉線']},
    {t:'第10堂：高速公路（上落匝道）',k:['高速公路']},
    {t:'第11堂：高速公路（轉線超車）',k:['高速公路','轉線']},
    {t:'第12堂：夜駕與雨天',k:['夜駕','雨天駕駛']},
    {t:'第13堂：路試路線演練',k:['路試路線']},
    {t:'第14堂：模擬路試',k:['路試路線']}],
  checks:{
    '三點掉頭':['睇鏡','打燈','睇盲點','選位安全','轉向控制','完成回正'],
    '平行泊車':['打燈','倒後觀察','入位角度','中途調整','距路邊30cm內'],
    '倒後入位':['睇鏡','倒後觀察','入位準確','速度控制'],
    '轉線':['睇鏡','打燈','睇盲點','保持車速','順暢入線'],
    '轉彎':['睇鏡','打燈','減速','行車線正確','轉後回正'],
    '路口讓先':['停線前停定','左右觀察','讓行人','起步暢順'],
    '高速公路':['加速匯入','保持車距','睇鏡','打燈','睇盲點'],
    '緊急停車':['快速反應','煞車控制','靠邊安全','開危險燈'],
    '斜路泊車':['方向盤角度正確','手掣使用','起步冇後溜'],
    '直路控制':['行車線置中','速度穩定','雙手揸軚']
  }
};}

/* ================= 資料 ================= */
const KEY='drivingApp_v1';
let DB = load();
let TAB = 'dash';
let VIEW_STUDENT = null;
let SEARCH = '';
let TMP_CHECKS = {};
let TMP_PHOTOS = [];

function load(){
  let d;
  try{ d = JSON.parse(localStorage.getItem(KEY)) || blank(); }
  catch(e){ d = blank(); }
  const def=DEF();
  d.config = d.config || {};
  for(const k in def){ if(d.config[k]===undefined) d.config[k]=def[k]; }
  return d;
}
function blank(){ return {students:[], lessons:[], payments:[], exams:[], config:DEF()}; }
function cfg(){ return DB.config; }
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(DB)); }
  catch(e){ alert('⚠️ 儲存空間已滿！請刪除部分相片，或匯出備份後清理舊資料。'); }
  render();
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ return '$'+(Math.round(n*100)/100).toLocaleString(); }
function pad(n){ return (n<10?'0':'')+n; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function lessonEnd(l){ return new Date(new Date(l.date+'T'+(l.start||'00:00')).getTime() + (l.dur||1)*3600000); }
function isPast(l){ return lessonEnd(l) < new Date(); }
function stuName(id){ const s=DB.students.find(x=>x.id===id); return s?s.name:'(已刪除)'; }
function stu(id){ return DB.students.find(x=>x.id===id); }
function wa(p){ const d=(p||'').replace(/\D/g,''); if(!d){alert('呢個學生未有電話號碼');return;} const n=d.length===10?'1'+d:d; window.open('https://wa.me/'+n,'_blank'); }
function pctOf(l){
  if(!l.checks) return null;
  let t=0,k=0;
  for(const tp in l.checks){ for(const i in l.checks[tp]){ t++; if(l.checks[tp][i]) k++; } }
  return t?Math.round(k/t*100):null;
}
function pctColor(p){ return p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)'; }

/* ================= 頁面切換 ================= */
document.getElementById('nav').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  TAB=b.dataset.t; VIEW_STUDENT=null;
  document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('on', x===b));
  render();
});

function render(){
  document.getElementById('today').textContent = new Date().toLocaleDateString('zh-HK',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + ' · 多倫多';
  const m=document.getElementById('main');
  if(TAB==='dash') m.innerHTML=vDash();
  if(TAB==='students') m.innerHTML = VIEW_STUDENT ? vStudentDetail(VIEW_STUDENT) : vStudents();
  if(TAB==='schedule') m.innerHTML=vSchedule();
  if(TAB==='money') m.innerHTML=vMoney();
  if(TAB==='settings') m.innerHTML=vSettings();
}

/* ================= 統計頁 ================= */
function monthKey(d){ return d.slice(0,7); }
function incomeByMonth(){
  const map={};
  DB.payments.forEach(p=>{ const k=monthKey(p.date); map[k]=(map[k]||0)+Number(p.amount); });
  return map;
}
function owedOf(sid){
  const fees=DB.lessons.filter(l=>l.studentId===sid && isPast(l)).reduce((a,l)=>a+Number(l.fee||0),0);
  const paid=DB.payments.filter(p=>p.studentId===sid).reduce((a,p)=>a+Number(p.amount),0);
  return fees-paid;
}
function vDash(){
  const now=new Date(); const thisM=now.getFullYear()+'-'+pad(now.getMonth()+1);
  const inc=incomeByMonth();
  const owedTotal=DB.students.reduce((a,s)=>a+Math.max(0,owedOf(s.id)),0);
  const active=DB.students.filter(s=>s.status!=='已考牌'&&s.status!=='暫停').length;
  const done=DB.exams.filter(e=>e.result==='合格').length;
  const fail=DB.exams.filter(e=>e.result==='不合格').length;
  const rate=(done+fail)?Math.round(done/(done+fail)*100)+'%':'—';

  // 今日／聽日堂表
  const td=todayStr();
  const tmd=(()=>{const d=new Date(now.getTime()+864e5);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());})();
  const dayList=[
    ...DB.lessons.filter(l=>l.date===td).sort((a,b)=>a.start.localeCompare(b.start)).map(l=>({l,tag:'今日'})),
    ...DB.lessons.filter(l=>l.date===tmd).sort((a,b)=>a.start.localeCompare(b.start)).map(l=>({l,tag:'聽日'}))];
  const todayCard=dayList.length?`<div class="card" style="margin-top:12px"><h3>🗓️ 今日／聽日堂表</h3>${dayList.map(x=>`
    <div class="item row"><span class="tag ${x.tag==='今日'?'g':'a'}">${x.tag}</span><b>${x.l.start}</b>
      <span>${esc(stuName(x.l.studentId))}</span>
      ${x.l.ltype?`<span class="tag">${esc(x.l.ltype)}</span>`:''}<span class="muted">${x.l.dur}小時</span>
      ${x.l.loc?`<span class="muted">📍 ${esc(x.l.loc)}</span>`:''}
      <button class="btn sm right" onclick="gcal('${x.l.id}')">📅</button></div>`).join('')}</div>`:'';

  // 考試倒數
  const upEx=DB.exams.filter(e=>e.result==='未考'&&e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));
  const exCard=upEx.length?`<div class="card" style="margin-top:12px"><h3>⏰ 考試倒數</h3>${upEx.map(e=>{
    const days=Math.round((new Date(e.date)-new Date(todayStr()))/864e5);
    return `<div class="item row"><b>${esc(stuName(e.studentId))}</b><span class="tag a">${esc(e.type)}路試</span>
      <span class="muted">${e.date} · ${esc(e.centre||'')}</span>
      <span class="right" style="font-weight:800;color:${days<=7?'var(--red)':'var(--amber)'}">${days===0?'今日！':'仲有'+days+'日'}</span></div>`;}).join('')}</div>`:'';

  // 12個月收入
  let bars='', max=1; const months=[];
  for(let i=11;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); const k=d.getFullYear()+'-'+pad(d.getMonth()+1); months.push(k); max=Math.max(max,inc[k]||0); }
  months.forEach(k=>{ const v=inc[k]||0; bars+='<div class="bar" style="height:'+Math.max(2,v/max*95)+'px"><b>'+(v?Math.round(v):'')+'</b><span>'+k.slice(5)+'月</span></div>'; });

  // 時段分佈
  const hours={}; let hmax=1;
  DB.lessons.forEach(l=>{ const h=parseInt((l.start||'0').split(':')[0]); hours[h]=(hours[h]||0)+1; hmax=Math.max(hmax,hours[h]); });
  let hbars='';
  for(let h=7;h<=21;h++){ const v=hours[h]||0; hbars+='<div class="bar" style="height:'+Math.max(2,v/hmax*95)+'px;background:var(--green)"><b>'+(v||'')+'</b><span>'+h+'</span></div>'; }

  // 8週堂數
  let wbars='', wmax=1; const weeks=[];
  for(let i=7;i>=0;i--){ const start=new Date(now); start.setDate(now.getDate()-now.getDay()-i*7); const end=new Date(start); end.setDate(start.getDate()+7);
    const c=DB.lessons.filter(l=>{const d=new Date(l.date); return d>=start&&d<end;}).length; weeks.push({label:(start.getMonth()+1)+'/'+start.getDate(),c}); wmax=Math.max(wmax,c); }
  weeks.forEach(w=>{ wbars+='<div class="bar" style="height:'+Math.max(2,w.c/wmax*95)+'px;background:var(--amber)"><b>'+(w.c||'')+'</b><span>'+w.label+'</span></div>'; });

  const owedList=DB.students.map(s=>({s,o:owedOf(s.id)})).filter(x=>x.o>0).sort((a,b)=>b.o-a.o);

  return `
  <div class="grid2">
    <div class="stat"><div class="l">本月收入</div><div class="v" style="color:var(--green)">${money(inc[thisM]||0)}</div></div>
    <div class="stat"><div class="l">未收學費</div><div class="v" style="color:${owedTotal>0?'var(--red)':'var(--ink)'}">${money(owedTotal)}</div></div>
    <div class="stat"><div class="l">進行中學生</div><div class="v">${active}</div></div>
    <div class="stat"><div class="l">路試合格率</div><div class="v">${rate}</div></div>
  </div>
  ${todayCard}
  ${exCard}
  <div class="card" style="margin-top:12px"><h3>近12個月收入 (CAD)</h3><div class="chart chartwrap">${bars}</div></div>
  <div class="card"><h3>上堂時段分佈（點鐘）</h3><div class="chart chartwrap">${hbars}</div></div>
  <div class="card"><h3>近8星期堂數</h3><div class="chart chartwrap">${wbars}</div></div>
  ${owedList.length?`<div class="card"><h3>⚠️ 未交齊學費學生</h3>${owedList.map(x=>`<div class="item row"><b>${esc(x.s.name)}</b><span class="right" style="color:var(--red);font-weight:700">${money(x.o)}</span></div>`).join('')}</div>`:''}`;
}

/* ================= 學生頁 ================= */
function vStudents(){
  const list=DB.students
    .filter(s=>!SEARCH || s.name.toLowerCase().includes(SEARCH.toLowerCase()) || (s.phone||'').includes(SEARCH))
    .sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));
  return `
  <div class="row" style="margin-bottom:12px">
    <input class="searchbox" style="flex:1;margin:0" placeholder="🔍 搵學生（名/電話）" value="${esc(SEARCH)}" oninput="SEARCH=this.value;render();document.querySelector('.searchbox').focus()">
    <button class="btn" onclick="formStudent()">＋ 新學生</button>
  </div>
  ${list.length?list.map(s=>{
    const o=owedOf(s.id); const n=DB.lessons.filter(l=>l.studentId===s.id&&isPast(l)).length;
    return `<div class="card" onclick="VIEW_STUDENT='${s.id}';render()" style="cursor:pointer">
      <div class="row"><b style="font-size:16px">${esc(s.name)}</b>
        <span class="tag ${s.status==='已考牌'?'g':s.status==='暫停'?'r':''}">${esc(s.status||'學緊')}</span>
        <span class="tag a">${esc(s.stage||'G2')}</span>
        ${s.phone?`<button class="btn green sm" onclick="event.stopPropagation();wa('${esc(s.phone)}')">💬</button>`:''}
        <span class="right muted">已上 ${n} 堂</span></div>
      <div class="muted" style="margin-top:4px">📞 ${esc(s.phone||'—')} ${o>0?' · <span style="color:var(--red);font-weight:700">欠 '+money(o)+'</span>':''}</div>
    </div>`;}).join('')
  :'<div class="card muted">未有學生，撳「＋ 新學生」開始。</div>'}`;
}

function vStudentDetail(id){
  const s=stu(id); if(!s){VIEW_STUDENT=null; return vStudents();}
  const lessons=DB.lessons.filter(l=>l.studentId===id).sort((a,b)=>(b.date+b.start).localeCompare(a.date+a.start));
  const pays=DB.payments.filter(p=>p.studentId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const exams=DB.exams.filter(e=>e.studentId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const o=owedOf(id);
  const past=lessons.filter(isPast);
  const lastFocus=past.length&&past[0].nextFocus?past[0].nextFocus:'';
  return `
  <button class="btn grey sm" onclick="VIEW_STUDENT=null;render()">← 返回學生列表</button>
  <div class="card" style="margin-top:10px">
    <div class="row"><b style="font-size:18px">${esc(s.name)}</b>
      <span class="tag ${s.status==='已考牌'?'g':s.status==='暫停'?'r':''}">${esc(s.status||'學緊')}</span>
      <span class="tag a">${esc(s.stage||'G2')}</span>
      <button class="btn grey sm right" onclick="formStudent('${id}')">編輯</button></div>
    <div class="muted" style="margin-top:6px">📞 ${esc(s.phone||'—')} · ✉️ ${esc(s.email||'—')}<br>📍 ${esc(s.address||'—')}<br>🏁 考試中心：${esc(s.centre||'未定')}</div>
    ${s.notes?`<div style="margin-top:6px;font-size:13px">📝 ${esc(s.notes)}</div>`:''}
    ${(s.photos||[]).length?`<div class="row" style="margin-top:8px">${s.photos.map(p=>`<img class="thumb" src="${p.data}" onclick="viewPhoto('${id}','${p.id}')">`).join('')}</div>`:''}
    ${lastFocus?`<div style="margin-top:8px;padding:8px;background:#fdf3e3;border-radius:8px;font-size:13px"><b>⭐ 下堂加強：</b>${esc(lastFocus)}</div>`:''}
  </div>
  <div class="grid2">
    <div class="stat"><div class="l">已上堂數</div><div class="v">${past.length}</div></div>
    <div class="stat"><div class="l">未收學費</div><div class="v" style="color:${o>0?'var(--red)':'var(--green)'}">${money(Math.max(0,o))}</div></div>

/* ================= 進度報告 ================= */
function report(id){
  const s=stu(id); if(!s) return;
  const past=DB.lessons.filter(l=>l.studentId===id&&isPast(l)).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));
  const hours=past.reduce((a,l)=>a+Number(l.dur||0),0);
  const covered=[...new Set(past.flatMap(l=>l.topics||[]))];
  const notCovered=cfg().topics.filter(t=>!covered.includes(t));
  const pcts=past.map(pctOf).filter(x=>x!=null);
  const avg=pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):null;
  const miss={};
  past.forEach(l=>{ if(l.checks) for(const tp in l.checks) for(const i in l.checks[tp]) if(!l.checks[tp][i]) miss[i]=(miss[i]||0)+1; });
  const weak=Object.entries(miss).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const upEx=DB.exams.filter(e=>e.studentId===id&&e.result==='未考'&&e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));
  const lastFocus=[...past].reverse().find(l=>l.nextFocus);

  let txt='📋 學車進度報告\n';
  txt+='━━━━━━━━━━━━━━\n';
  txt+='學生：'+s.name+'\n';
  txt+='牌照階段：'+(s.stage||'')+'\n';
  txt+='目標考試中心：'+(s.centre||'未定')+'\n';
  txt+='已上堂數：'+past.length+'堂（共'+hours+'小時）\n';
  if(upEx.length){ upEx.forEach(e=>{ const days=Math.round((new Date(e.date)-new Date(todayStr()))/864e5); txt+='📅 '+e.type+'路試：'+e.date+'（仲有'+days+'日）\n'; }); }
  if(avg!=null) txt+='平均動作評分：'+avg+'%\n';
  txt+='\n✅ 已學內容：\n'+(covered.length?covered.map(t=>'・'+t).join('\n'):'（未有記錄）')+'\n';
  if(notCovered.length) txt+='\n📌 未學內容：\n'+notCovered.map(t=>'・'+t).join('\n')+'\n';
  if(weak.length) txt+='\n⚠️ 需加強動作（最常漏做）：\n'+weak.map(w=>'・'+w[0]+'（'+w[1]+'次）').join('\n')+'\n';
  if(lastFocus) txt+='\n⭐ 下堂重點：'+lastFocus.nextFocus+'\n';
  txt+='\n報告日期：'+todayStr();

  openModal(`<h3>📋 ${esc(s.name)} 進度報告</h3>
  <textarea id="rpt" rows="14" readonly style="font-size:13px;margin-top:8px">${esc(txt)}</textarea>
  <div class="row" style="margin-top:12px">
    <button class="btn" onclick="copyRpt()">📄 複製</button>
    ${navigator.share?'<button class="btn green" onclick="shareRpt()">📤 分享</button>':''}
    <button class="btn grey right" onclick="closeModal()">關閉</button></div>`);
}
function copyRpt(){
  const t=document.getElementById('rpt').value;
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>alert('已複製，可以貼上WhatsApp')); }
  else{ document.getElementById('rpt').select(); document.execCommand('copy'); alert('已複製'); }
}
function shareRpt(){ navigator.share({text:document.getElementById('rpt').value}); }

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='教車備份_'+todayStr()+'.json';
  a.click();
}
function importData(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!d.students) throw 0;
      if(confirm('匯入會覆蓋目前資料（學生'+d.students.length+'人）。繼續？')){ localStorage.setItem(KEY,JSON.stringify(d)); DB=load(); save(); alert('匯入成功！'); }
    }catch(e){ alert('檔案格式唔啱，請揀返之前匯出嘅備份檔。'); } };
  r.readAsText(f);
}

/* ================= Google Calendar ================= */
function gcal(lid){
  const l=DB.lessons.find(x=>x.id===lid); if(!l) return;
  const s=stu(l.studentId)||{};
  const st=new Date(l.date+'T'+l.start);
  const en=new Date(st.getTime()+(l.dur||1)*3600000);
  const f=d=>d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
  const details='學生: '+(s.name||'')+'\n電話: '+(s.phone||'')+'\n牌照階段: '+(s.stage||'')+(l.title?'\n課程: '+l.title:'')+(l.nextFocus?'\n本堂重點: '+l.nextFocus:'');
  const url='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent('教車 - '+(s.name||''))
    +'&dates='+f(st)+'/'+f(en)
    +'&ctz=America/Toronto'
    +'&location='+encodeURIComponent(l.loc||'')
    +'&details='+encodeURIComponent(details);
  window.open(url,'_blank');
}

  <label>Email</label><input id="f_email" inputmode="email" value="${esc(s.email||'')}">
  <label>接送地址</label><input id="f_addr" value="${esc(s.address||'')}">
  <label>牌照階段</label><select id="f_stage">${['G1','G2','G'].map(x=>`<option ${s.stage===x?'selected':''}>${x}</option>`).join('')}</select>
  <label>目標考試中心</label><select id="f_centre"><option value="">未定</option>${cfg().centres.map(x=>`<option ${s.centre===x?'selected':''}>${esc(x)}</option>`).join('')}</select>
  <label>狀態</label><select id="f_status">${['學緊','已考牌','暫停'].map(x=>`<option ${(s.status||'學緊')===x?'selected':''}>${x}</option>`).join('')}</select>
  <label>備註</label><textarea id="f_notes" rows="2">${esc(s.notes||'')}</textarea>
  <label>📷 相片（駕駛執照等，自動壓縮）</label>
  <div id="photolist" class="row"></div>
  <label class="btn grey sm" style="display:inline-block;width:auto;margin-top:6px">＋ 影相/揀相
    <input type="file" accept="image/*" style="display:none" onchange="addPhoto(this)"></label>
  <div class="row" style="margin-top:14px"><button class="btn" onclick="saveStudent('${id||''}')">儲存</button>
  <button class="btn grey" onclick="closeModal()">取消</button></div>`);
  renderPhotoList();
}
function renderPhotoList(){
  const el=document.getElementById('photolist'); if(!el) return;
  el.innerHTML=TMP_PHOTOS.map((p,i)=>`<span style="position:relative;display:inline-block">
    <img class="thumb" src="${p.data}">
    <span onclick="TMP_PHOTOS.splice(${i},1);renderPhotoList()" style="position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;text-align:center;line-height:20px;font-size:12px;cursor:pointer">✕</span></span>`).join('')||'<span class="muted">未有相片</span>';
}
function addPhoto(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      let w=img.width,h=img.height; const max=1000;
      if(w>max){ h=h*max/w; w=max; }
      if(h>max){ w=w*max/h; h=max; }
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      TMP_PHOTOS.push({id:uid(),data:c.toDataURL('image/jpeg',0.72)});
      renderPhotoList();
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
  input.value='';
}
function saveStudent(id){
  const name=val('f_name'); if(!name){alert('請輸入姓名');return;}
  const d={name, phone:val('f_phone'), email:val('f_email'), address:val('f_addr'),
    stage:val('f_stage'), centre:val('f_centre'), status:val('f_status'), notes:val('f_notes'),
    photos:TMP_PHOTOS};
  if(id){ Object.assign(stu(id), d); } else { d.id=uid(); DB.students.push(d); }
  closeModal(); save();
}
function delStudent(id){
  if(!confirm('確定刪除呢個學生？佢嘅堂數、收款、考試記錄都會一齊刪除！')) return;
  DB.students=DB.students.filter(s=>s.id!==id);
  DB.lessons=DB.lessons.filter(l=>l.studentId!==id);
  DB.payments=DB.payments.filter(p=>p.studentId!==id);
  DB.exams=DB.exams.filter(e=>e.studentId!==id);
  VIEW_STUDENT=null; save();
}

/* --- 堂記錄表單（連課程選單+動作檢查） --- */
function formLesson(id, presetStu){
  if(!DB.students.length){ alert('請先新增學生'); return; }
  const l=id?DB.lessons.find(x=>x.id===id):{};
  const sid=l.studentId||presetStu||DB.students[0].id;
  TMP_CHECKS=JSON.parse(JSON.stringify(l.checks||{}));
  const currIdx=cfg().curriculum.findIndex(c=>c.t===l.title);
  const st0=stu(sid)||{};
  const ltype=l.ltype||(st0.stage==='G'?'G堂':'G2堂');
  const defDur=l.dur||(ltype.includes('考試')?3:2);
  const defFee=l.fee!=null?l.fee:(autoFee(ltype,defDur)!=null?autoFee(ltype,defDur):cfg().defaultFee);
  openModal(`<h3>${id?'編輯堂記錄':'排新堂'}</h3>
  <label>學生</label><select id="f_sid">${DB.students.map(s=>`<option value="${s.id}" ${s.id===sid?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
  <label>💵 堂類型（自動計價，金額可再改）</label>
  <select id="f_ltype" onchange="typeChanged()">${['G2堂','G堂','G2考試日','G考試日','自訂'].map(x=>`<option ${ltype===x?'selected':''}>${x}</option>`).join('')}</select>
  <label>📚 標準課程選單（揀咗自動剔好教學內容）</label>
  <select id="f_curr" onchange="applyCurr(this.value)"><option value="">— 自選內容 —</option>
    ${cfg().curriculum.map((c,i)=>`<option value="${i}" ${i===currIdx?'selected':''}>${esc(c.t)}</option>`).join('')}</select>
  <label>日期 *</label><input id="f_date" type="date" value="${l.date||todayStr()}">
  <label>開始時間 *</label><input id="f_start" type="time" value="${l.start||'10:00'}">
  <label>時長（小時）</label><select id="f_dur" onchange="calcFee()">${[1,1.5,2,2.5,3,3.5,4].map(x=>`<option ${defDur==x?'selected':''}>${x}</option>`).join('')}</select>
  <label>本堂收費 (CAD)</label><input id="f_fee" type="number" inputmode="decimal" value="${defFee}">
  <label>接送/上堂地點</label><input id="f_loc" value="${esc(l.loc||'')}">
  <label>教學內容（上完堂先填都得）</label>
  <div class="checkrow">${cfg().topics.map(t=>`<label><input type="checkbox" class="f_topic" value="${esc(t)}" ${(l.topics||[]).includes(t)?'checked':''} onchange="renderChecks()">${esc(t)}</label>`).join('')}</div>
  <label>✅ 動作檢查（逐項剔，自動計分）</label>
  <div id="checksbox" onchange="onChk(event)"></div>
  <label>本堂整體評分</label><select id="f_score"><option value="">未評</option>${[1,2,3,4,5].map(x=>`<option value="${x}" ${l.score==x?'selected':''}>${'★'.repeat(x)}</option>`).join('')}</select>
  <label>該堂問題（有咩做得唔好）</label><textarea id="f_problems" rows="2">${esc(l.problems||'')}</textarea>
  <label>⭐ 下堂加強練習</label><textarea id="f_next" rows="2">${esc(l.nextFocus||'')}</textarea>
  <div class="row" style="margin-top:14px"><button class="btn" onclick="saveLesson('${id||''}')">儲存</button>
  <button class="btn grey" onclick="closeModal()">取消</button></div>`);
  renderChecks();
}
function autoFee(ty,dur){
  const r=cfg().rates;
  if(ty==='G2堂') return r.g2*dur;
  if(ty==='G堂') return r.g*dur;
  if(ty==='G2考試日') return r.rental + r.g2*dur;
  if(ty==='G考試日') return r.rental + r.g*dur;
  return null;
}
function typeChanged(){
  const ty=val('f_ltype');
  const dEl=document.getElementById('f_dur');
  if(ty.includes('考試')) dEl.value='3';
  else if(ty!=='自訂') dEl.value='2';
  calcFee();
}
function calcFee(){
  const f=autoFee(val('f_ltype'), Number(val('f_dur')));
  if(f!=null) document.getElementById('f_fee').value=f;
}
function applyCurr(i){
  if(i===''){ return; }
  const c=cfg().curriculum[Number(i)];
  document.querySelectorAll('.f_topic').forEach(x=>{ x.checked=c.k.includes(x.value); });
  renderChecks();
}
function renderChecks(){
  const box=document.getElementById('checksbox'); if(!box) return;
  const selected=[...document.querySelectorAll('.f_topic:checked')].map(x=>x.value);
  const withChecks=selected.filter(t=>cfg().checks[t]&&cfg().checks[t].length);
  box.innerHTML = withChecks.length ? withChecks.map(t=>{
    return '<div style="margin-top:8px;padding:8px;background:#f8fafc;border-radius:8px"><b style="font-size:13px">'+esc(t)+'</b><div class="checkrow">'
      +cfg().checks[t].map(it=>{
        const on=TMP_CHECKS[t]&&TMP_CHECKS[t][it];
        return '<label><input type="checkbox" class="chk" data-t="'+esc(t)+'" data-i="'+esc(it)+'" '+(on?'checked':'')+'>'+esc(it)+'</label>';
      }).join('')+'</div></div>';
  }).join('') : '<div class="muted">揀咗有檢查清單嘅教學項目，動作清單就會喺度出現</div>';
}
function onChk(e){
  const el=e.target;
  if(!el.classList.contains('chk')) return;
  const t=el.dataset.t, i=el.dataset.i;
  TMP_CHECKS[t]=TMP_CHECKS[t]||{};
  TMP_CHECKS[t][i]=el.checked;
}
function saveLesson(id){
  const date=val('f_date'), start=val('f_start');
  if(!date||!start){alert('請填日期同時間');return;}
  // 時間衝突檢查
  const stNew=new Date(date+'T'+start).getTime();
  const enNew=stNew+Number(val('f_dur'))*3600000;
  const clash=DB.lessons.find(x=>{
    if(x.id===id||x.date!==date) return false;
    const s2=new Date(x.date+'T'+x.start).getTime();
    const e2=s2+(x.dur||1)*3600000;
    return stNew<e2 && s2<enNew;
  });
  if(clash && !confirm('⚠️ 時間衝突！同「'+stuName(clash.studentId)+'」（'+clash.start+'開始，'+clash.dur+'小時）重疊。\n仍然要儲存？')) return;
  const topics=[...document.querySelectorAll('.f_topic:checked')].map(x=>x.value);
  const checks={};
  topics.forEach(t=>{ if(TMP_CHECKS[t]&&Object.keys(TMP_CHECKS[t]).length) checks[t]=TMP_CHECKS[t]; });
  const ci=val('f_curr');
  const d={studentId:val('f_sid'), date, start, dur:Number(val('f_dur')), fee:Number(val('f_fee')||0),
    ltype:val('f_ltype'), loc:val('f_loc'), topics, checks:Object.keys(checks).length?checks:null,
    title: ci!==''?cfg().curriculum[Number(ci)].t:'',
    score:val('f_score')?Number(val('f_score')):null, problems:val('f_problems'), nextFocus:val('f_next')};
  if(id){ Object.assign(DB.lessons.find(x=>x.id===id), d); }
  else { d.id=uid(); DB.lessons.push(d); }
  closeModal(); save();
  if(!id && new Date(date+'T'+start)>new Date() && confirm('已排堂！要唔要即刻加入Google日曆？')) gcal(id||d.id);
}
function delLesson(id){ if(confirm('確定刪除呢堂？')){ DB.lessons=DB.lessons.filter(l=>l.id!==id); save(); } }

/* --- 收款表單 --- */
function formPayment(sid){
  openModal(`<h3>收學費</h3>
  <label>學生</label><select id="f_sid">${DB.students.map(s=>`<option value="${s.id}" ${s.id===sid?'selected':''}>${esc(s.name)}（欠${money(Math.max(0,owedOf(s.id)))}）</option>`).join('')}</select>
  <label>金額 (CAD) *</label><input id="f_amount" type="number" inputmode="decimal">
  <label>日期</label><input id="f_date" type="date" value="${todayStr()}">
  <label>方式</label><select id="f_method">${['現金','e-Transfer','支票','其他'].map(x=>`<option>${x}</option>`).join('')}</select>
  <label>備註</label><input id="f_note">
  <div class="row" style="margin-top:14px"><button class="btn green" onclick="savePayment()">儲存</button>
  <button class="btn grey" onclick="closeModal()">取消</button></div>`);
}
function savePayment(){
  const amount=Number(val('f_amount')); if(!amount){alert('請輸入金額');return;}
  DB.payments.push({id:uid(), studentId:val('f_sid'), amount, date:val('f_date')||todayStr(), method:val('f_method'), note:val('f_note')});
  closeModal(); save();
}
function delPayment(id){ if(confirm('確定刪除呢筆收款？')){ DB.payments=DB.payments.filter(p=>p.id!==id); save(); } }

/* --- 考試表單 --- */
function formExam(id, presetStu){
  const e=id?DB.exams.find(x=>x.id===id):{};
  const sid=e.studentId||presetStu||(DB.students[0]||{}).id;
  openModal(`<h3>${id?'編輯考試':'新增考試'}</h3>
  <label>學生</label><select id="f_sid">${DB.students.map(s=>`<option value="${s.id}" ${s.id===sid?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
  <label>考試類型</label><select id="f_type">${['G2','G'].map(x=>`<option ${e.type===x?'selected':''}>${x}</option>`).join('')}</select>
  <label>考試日期</label><input id="f_date" type="date" value="${e.date||todayStr()}">
  <label>考試中心</label><select id="f_centre">${cfg().centres.map(x=>`<option ${e.centre===x?'selected':''}>${esc(x)}</option>`).join('')}</select>
  <label>結果</label><select id="f_result">${['未考','合格','不合格'].map(x=>`<option ${(e.result||'未考')===x?'selected':''}>${x}</option>`).join('')}</select>
  <div class="row" style="margin-top:14px"><button class="btn amber" onclick="saveExam('${id||''}')">儲存</button>
  <button class="btn grey" onclick="closeModal()">取消</button></div>`);
}
function saveExam(id){
  const d={studentId:val('f_sid'), type:val('f_type'), date:val('f_date'), centre:val('f_centre'), result:val('f_result')};
  if(id){ Object.assign(DB.exams.find(x=>x.id===id), d); }
  else { d.id=uid(); DB.exams.push(d); }
  if(d.result==='合格'&&d.type==='G'){ const s=stu(d.studentId); if(s) s.status='已考牌'; }
  closeModal(); save();
}

render();
</script>
